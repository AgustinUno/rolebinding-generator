<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ENIC · tools.ts Generator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0f; --surface: #141416; --surface2: #18181c;
  --border: #222228; --border2: #2e2e38;
  --text: #e8e8ec; --muted: #52525e; --muted2: #7a7a8a;
  --accent: #6c8eff; --accent-dim: #151d38; --accent-glow: rgba(108,142,255,0.15);
  --green: #4ade80; --green-dim: #0c1f14;
  --red: #f87171; --red-dim: #250d0d;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --r: 6px;
}
body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 52px; flex-shrink: 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.pill { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(108,142,255,.25); }
.header-hint { font-size: 11px; color: var(--muted); }

/* Layout */
.layout { display: grid; grid-template-columns: 480px 1fr; flex: 1; overflow: hidden; }

/* Left panel */
.left { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
.left-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
.left-body { flex: 1; overflow-y: auto; padding: 16px 20px; }

/* Right panel */
.right { display: flex; flex-direction: column; overflow: hidden; }
.right-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
.right-body { flex: 1; overflow: auto; padding: 20px 24px; }

/* Section label */
.slabel { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }

/* Input */
input[type=text], select, textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--r); padding: 7px 11px; font-family: var(--sans);
  font-size: 13px; color: var(--text); outline: none; transition: border-color .15s;
}
input[type=text]:focus, select:focus, textarea:focus { border-color: var(--accent); }
input::placeholder, textarea::placeholder { color: var(--muted); }
select option { background: #1a1a20; }

/* Add form */
.add-form {
  background: rgba(108,142,255,.04); border: 1px dashed rgba(108,142,255,.25);
  border-radius: var(--r); padding: 16px; margin-bottom: 14px;
}
.field { margin-bottom: 10px; }
.field:last-child { margin-bottom: 0; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

/* Role chips */
.chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  font-size: 11px; padding: 3px 9px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--surface2);
  cursor: pointer; user-select: none; transition: all .12s;
}
.chip:hover { border-color: var(--border2); }
.chip.on { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 13px; border-radius: var(--r); font-family: var(--sans);
  font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all .15s;
}
.btn-ghost { background: transparent; border-color: var(--border); color: var(--muted2); }
.btn-ghost:hover { border-color: var(--border2); color: var(--text); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { opacity: .85; }
.btn-green { background: var(--green); color: #0a0a0a; font-weight: 600; }
.btn-green:hover { opacity: .85; }
.btn-red { background: transparent; border-color: transparent; color: var(--red); padding: 4px 8px; }
.btn-red:hover { background: var(--red-dim); }
.btn-sm { padding: 4px 9px; font-size: 11px; }
.row { display: flex; align-items: center; gap: 8px; }

/* Tool cards */
.tool-card { border: 1px solid var(--border); border-radius: var(--r); background: var(--surface); margin-bottom: 8px; overflow: hidden; }
.tool-card:hover { border-color: var(--border2); }
.card-header { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px; cursor: pointer; }
.card-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
.card-num { font-family: var(--mono); font-size: 10px; color: var(--muted); min-width: 18px; }
.card-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-url { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: 4px; white-space: nowrap; }
.card-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.sub-badge { font-size: 10px; padding: 2px 6px; border-radius: 20px; background: var(--accent-dim); color: var(--accent); font-family: var(--mono); }

/* Edit area */
.edit-area { border-top: 1px solid var(--border); padding: 14px; background: rgba(0,0,0,.25); }
.edit-field { margin-bottom: 10px; }

/* Subtool rows */
.subtool-block { background: rgba(0,0,0,.3); border: 1px solid var(--border); border-radius: var(--r); margin-top: 4px; }
.subtool-item { padding: 10px 12px; border-bottom: 1px solid var(--border); }
.subtool-item:last-child { border-bottom: none; }
.subtool-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.subtool-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.subtool-name { font-size: 12px; font-weight: 500; color: var(--muted2); }

/* Code output */
pre { font-family: var(--mono); font-size: 12px; line-height: 1.75; white-space: pre; color: #abb2bf; }
.kw { color: #c678dd; } .str { color: #98c379; } .cm { color: #5c6370; font-style: italic; }
.typ { color: #e5c07b; } .fn { color: #61afef; } .num { color: #d19a66; }

/* Empty */
.empty { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; border: 1px dashed var(--border); border-radius: var(--r); }

/* Toast */
.toast { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #0a0a0a; font-size: 12px; font-weight: 600; padding: 9px 16px; border-radius: var(--r); opacity: 0; transform: translateY(6px); transition: all .2s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.ptitle { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="dot"></div>
    ENIC MIS
    <span class="pill">tools.ts generator</span>
  </div>
  <span class="header-hint">Edit on the left · output updates live on the right</span>
</header>

<div class="layout">

  <!-- LEFT: Editor -->
  <div class="left">
    <div class="left-toolbar">
      <span class="ptitle">Tools</span>
      <button class="btn btn-accent btn-sm" onclick="toggleAdd()">+ Add Tool</button>
    </div>
    <div class="left-body">

      <!-- Add form -->
      <div id="addForm" style="display:none" class="add-form">
        <div class="field-row">
          <div class="field">
            <div class="slabel">Title</div>
            <input type="text" id="nTitle" placeholder="e.g. Reports" />
          </div>
          <div class="field">
            <div class="slabel">URL <span style="color:var(--muted);font-size:9px">(blank = has subtools)</span></div>
            <input type="text" id="nUrl" placeholder="/reports" />
          </div>
        </div>
        <div class="field">
          <div class="slabel">Description</div>
          <input type="text" id="nDesc" placeholder="Short description" />
        </div>
        <div class="field-row">
          <div class="field">
            <div class="slabel">Icon (lucide name)</div>
            <input type="text" id="nIcon" placeholder="e.g. BarChart2" />
          </div>
          <div class="field">
            <div class="slabel">Type</div>
            <select id="nType">
              <option value="leaf">Leaf (single page)</option>
              <option value="parent">Parent (has subtools)</option>
            </select>
          </div>
        </div>
        <div class="field">
          <div class="slabel">Allowed Roles</div>
          <div class="chips" id="nRolesChips"></div>
        </div>
        <div class="row" style="margin-top:12px">
          <button class="btn btn-ghost btn-sm" onclick="toggleAdd()">Cancel</button>
          <button class="btn btn-accent btn-sm" onclick="commitAdd()">Add</button>
        </div>
      </div>

      <!-- Tool list -->
      <div id="toolList"></div>
    </div>
  </div>

  <!-- RIGHT: Output -->
  <div class="right">
    <div class="right-toolbar">
      <span class="ptitle">Generated tools.ts</span>
      <div class="row">
        <button class="btn btn-ghost btn-sm" onclick="doCopy()">Copy</button>
        <button class="btn btn-green btn-sm" onclick="doDownload()">↓ Download</button>
      </div>
    </div>
    <div class="right-body">
      <pre id="out"></pre>
    </div>
  </div>

</div>
<div class="toast" id="toast">✓ Copied!</div>

<script>
const ROLES = ['superadmin','admin','guest','dev','operations','marketing','managers','documentations','it','others'];

let tools = [
  { title:'Home', url:'/home', icon:'Home', description:'Welcome dashboard and main landing page', allowedRoles:[], subtools:[] },
  { title:'Dashboard', url:'/dashboard', icon:'LayoutDashboard', description:'View system stats and analytics', allowedRoles:['superadmin','admin'], subtools:[] },
  { title:'User Management', url:'/users', icon:'User2Icon', description:'Manage users, roles, and permissions', allowedRoles:['superadmin','admin'], subtools:[] },
  { title:'Inventory & Assets', url:'', icon:'CirclePile', description:'Track and manage inventory and assets', allowedRoles:['superadmin','admin','operations'], subtools:[
    { title:'Asset List', url:'/inventory/assets', description:'View and edit all assets', allowedRoles:['superadmin','admin','operations'] },
    { title:'Asset Reports', url:'/inventory/reports', description:'Generate inventory and asset reports', allowedRoles:['superadmin'] },
  ]},
  { title:'Operations', url:'', icon:'HardHat', description:'Manage daily operations workflow', allowedRoles:['superadmin','operations'], subtools:[
    { title:'Task Board', url:'/operations/tasks', description:'View and manage tasks', allowedRoles:['superadmin','operations'] },
    { title:'Shift Schedules', url:'/operations/shifts', description:'Manage employee shifts', allowedRoles:['superadmin'] },
  ]},
  { title:'Finance', url:'', icon:'BadgeDollarSign', description:'Financial management tools and reports', allowedRoles:['superadmin','managers'], subtools:[
    { title:'Expense Tracker', url:'/finance/expenses', description:'Track company expenses', allowedRoles:['superadmin','managers'] },
    { title:'Budget Planner', url:'/finance/budget', description:'Plan and monitor budgets', allowedRoles:['superadmin','managers'] },
  ]},
  { title:'Marketing', url:'', icon:'HandshakeIcon', description:'CRM and marketing tools', allowedRoles:['superadmin','marketing'], subtools:[
    { title:'Campaigns', url:'/marketing/campaigns', description:'Manage marketing campaigns', allowedRoles:['superadmin','marketing'] },
    { title:'Leads', url:'/marketing/leads', description:'View and manage leads', allowedRoles:['superadmin','marketing'] },
  ]},
  { title:'AI Assistant', url:'/ai-assistant', icon:'BotIcon', description:'AI-powered workflow assistant', allowedRoles:['superadmin','admin'], subtools:[] },
];

// ── Render editor ──────────────────────────────────────────────────────────
function render() {
  const list = document.getElementById('toolList');
  if (!tools.length) { list.innerHTML = '<div class="empty">No tools. Click + Add Tool.</div>'; renderOut(); return; }

  list.innerHTML = tools.map((t, i) => `
    <div class="tool-card">
      <div class="card-header" onclick="toggleEdit(${i})">
        <div class="card-left">
          <span class="card-num">${String(i+1).padStart(2,'0')}</span>
          <span class="card-title">${esc(t.title)}</span>
          <span class="card-url">${t.url ? esc(t.url) : ''}</span>
        </div>
        <div class="card-right">
          ${t.subtools.length ? `<span class="sub-badge">${t.subtools.length} sub</span>` : ''}
          <button class="btn btn-red btn-sm" onclick="event.stopPropagation();removeTool(${i})">✕</button>
        </div>
      </div>
      <div id="ea-${i}" style="display:none">
        <div class="edit-area">

          <div class="field-row" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
            <div>
              <div class="slabel">Title</div>
              <input type="text" value="${esc(t.title)}" oninput="tools[${i}].title=this.value;renderOut()" />
            </div>
            <div>
              <div class="slabel">URL</div>
              <input type="text" value="${esc(t.url)}" oninput="tools[${i}].url=this.value;renderOut()" placeholder="/path or blank if parent" />
            </div>
          </div>

          <div style="margin-bottom:10px">
            <div class="slabel">Description</div>
            <input type="text" value="${esc(t.description||'')}" oninput="tools[${i}].description=this.value;renderOut()" placeholder="Short description" />
          </div>

          <div style="margin-bottom:10px">
            <div class="slabel">Icon (lucide name)</div>
            <input type="text" value="${esc(t.icon||'')}" oninput="tools[${i}].icon=this.value;renderOut()" placeholder="e.g. BarChart2" />
          </div>

          <div style="margin-bottom:14px">
            <div class="slabel">Allowed Roles</div>
            <div class="chips">
              ${ROLES.map(r => `<span class="chip ${t.allowedRoles.includes(r)?'on':''}" onclick="togRole(${i},-1,'${r}')">${r}</span>`).join('')}
            </div>
          </div>

          <!-- Subtools -->
          <div>
            <div class="row" style="margin-bottom:8px">
              <span class="slabel" style="margin-bottom:0">Subtools</span>
              <button class="btn btn-ghost btn-sm" onclick="addSub(${i})">+ Add Subtool</button>
            </div>
            ${t.subtools.length ? `
              <div class="subtool-block">
                ${t.subtools.map((s, j) => `
                  <div class="subtool-item">
                    <div class="subtool-header">
                      <span class="subtool-name">${esc(s.title) || 'Untitled'}</span>
                      <button class="btn btn-red btn-sm" onclick="removeSub(${i},${j})">✕</button>
                    </div>
                    <div class="subtool-fields">
                      <div>
                        <div class="slabel">Title</div>
                        <input type="text" value="${esc(s.title)}" oninput="tools[${i}].subtools[${j}].title=this.value;render()" placeholder="Subtool title" />
                      </div>
                      <div>
                        <div class="slabel">URL</div>
                        <input type="text" value="${esc(s.url)}" oninput="tools[${i}].subtools[${j}].url=this.value;renderOut()" placeholder="/module/path" />
                      </div>
                    </div>
                    <div style="margin-bottom:8px">
                      <div class="slabel">Description</div>
                      <input type="text" value="${esc(s.description||'')}" oninput="tools[${i}].subtools[${j}].description=this.value;renderOut()" placeholder="Description" />
                    </div>
                    <div>
                      <div class="slabel">Allowed Roles</div>
                      <div class="chips">
                        ${ROLES.map(r => `<span class="chip ${s.allowedRoles.includes(r)?'on':''}" onclick="togRole(${i},${j},'${r}')">${r}</span>`).join('')}
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            ` : `<div style="color:var(--muted);font-size:12px;padding:6px 0">No subtools yet.</div>`}
          </div>

        </div>
      </div>
    </div>
  `).join('');
  renderOut();
}

function toggleEdit(i) {
  const el = document.getElementById(`ea-${i}`);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function togRole(ti, si, role) {
  const arr = si === -1 ? tools[ti].allowedRoles : tools[ti].subtools[si].allowedRoles;
  const idx = arr.indexOf(role);
  if (idx > -1) arr.splice(idx, 1); else arr.push(role);
  render();
}

function removeTool(i) { tools.splice(i,1); render(); }
function addSub(i) { tools[i].subtools.push({title:'New Subtool',url:'',description:'',allowedRoles:[]}); render(); }
function removeSub(ti,si) { tools[ti].subtools.splice(si,1); render(); }

// ── Add form ───────────────────────────────────────────────────────────────
let nRoles = [];
function toggleAdd() {
  const f = document.getElementById('addForm');
  const open = f.style.display === 'none';
  f.style.display = open ? 'block' : 'none';
  if (open) {
    nRoles = [];
    document.getElementById('nRolesChips').innerHTML = ROLES.map(r =>
      `<span class="chip" id="nr-${r}" onclick="togNRole('${r}')">${r}</span>`
    ).join('');
  }
}
function togNRole(r) {
  const i = nRoles.indexOf(r); if (i>-1) nRoles.splice(i,1); else nRoles.push(r);
  document.getElementById(`nr-${r}`).classList.toggle('on', nRoles.includes(r));
}
function commitAdd() {
  const title = document.getElementById('nTitle').value.trim();
  if (!title) { alert('Title is required'); return; }
  tools.push({
    title, url: document.getElementById('nUrl').value.trim(),
    icon: document.getElementById('nIcon').value.trim(),
    description: document.getElementById('nDesc').value.trim(),
    allowedRoles: [...nRoles], subtools: []
  });
  ['nTitle','nUrl','nIcon','nDesc'].forEach(id => document.getElementById(id).value = '');
  toggleAdd(); render();
}

// ── Generate TS ────────────────────────────────────────────────────────────
function generateTS() {
  const icons = [...new Set(tools.filter(t=>t.icon).map(t=>t.icon))];

  // Build lazy import comments
  const lazyParts = [];
  tools.forEach(t => {
    if (!t.url || t.title === 'Home') return;
    lazyParts.push(`// const ${pascal(t.title)} = lazy(() => import("@/pages/${pascal(t.title)}Page"));`);
  });
  tools.forEach(t => {
    (t.subtools||[]).forEach(s => {
      const seg = s.url.split('/').filter(Boolean);
      const dir = seg.length > 1 ? seg.slice(0,-1).join('/') : '';
      const path = dir ? `@/pages/tools/${dir}/${pascal(s.title)}Page` : `@/pages/tools/${pascal(s.title)}Page`;
      lazyParts.push(`// const ${pascal(s.title)} = lazy(() => import("${path}"));`);
    });
  });

  // Build toolsData string
  const toolsStr = tools.map(t => {
    const lines = ['  {'];
    lines.push(`    title: "${t.title}",`);
    if (t.url) lines.push(`    url: "${t.url}",`);
    if (t.icon) lines.push(`    icon: ${t.icon},`);
    if (t.description) lines.push(`    description: "${t.description}",`);
    if (t.allowedRoles?.length) lines.push(`    allowedRoles: [${t.allowedRoles.map(r=>`"${r}"`).join(', ')}],`);
    if (t.url && t.title !== 'Home') lines.push(`    // component: ${pascal(t.title)},`);
    if (t.subtools?.length) {
      lines.push('    subtools: [');
      t.subtools.forEach(s => {
        lines.push('      {');
        lines.push(`        title: "${s.title}",`);
        lines.push(`        url: "${s.url}",`);
        if (s.description) lines.push(`        description: "${s.description}",`);
        if (s.allowedRoles?.length) lines.push(`        allowedRoles: [${s.allowedRoles.map(r=>`"${r}"`).join(', ')}],`);
        lines.push(`        // component: ${pascal(s.title)},`);
        lines.push('      },');
      });
      lines.push('    ],');
    }
    lines.push('  },');
    return lines.join('\n');
  }).join('\n');

  // Build component checklist
  const checklistItems = [];
  tools.forEach(t => {
    if (!t.url || t.title === 'Home') return;
    const seg = t.url.split('/').filter(Boolean);
    const path = seg.length > 1
      ? `src/pages/tools/${seg.slice(0,-1).join('/')}/${pascal(t.title)}Page.tsx`
      : `src/pages/${pascal(t.title)}Page.tsx`;
    checklistItems.push(`//   [ ] ${pascal(t.title)}Page  →  ${path}`);
  });
  tools.forEach(t => {
    (t.subtools||[]).forEach(s => {
      const seg = s.url.split('/').filter(Boolean);
      const dir = seg.length > 1 ? seg.slice(0,-1).join('/') : 'tools';
      checklistItems.push(`//   [ ] ${pascal(s.title)}Page  →  src/pages/tools/${dir}/${pascal(s.title)}Page.tsx`);
    });
  });

  return `import type { ElementType, ComponentType } from "react";
import {
${icons.map(ic => `  ${ic},`).join('\n')}
} from "lucide-react";
import { lazy } from "react";
import type { UserRole } from "./schema";

export interface SubTool {
  title: string;
  url: string;
  description?: string;
  allowedRoles?: UserRole[];
  component?: ComponentType;
}

export interface Tool {
  title: string;
  url?: string;
  description?: string;
  icon?: ElementType;
  allowedRoles?: UserRole[];
  subtools?: SubTool[];
  component?: ComponentType;
}

// ---------------------------------------------------------------------------
// Lazy imports — uncomment when component is ready, then set component: X
// ---------------------------------------------------------------------------
${lazyParts.join('\n')}

export const toolsData: Tool[] = [
${toolsStr}
];

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
export function hasAccess(
  userRole: UserRole | undefined,
  allowedRoles: UserRole[] | undefined
): boolean {
  if (!userRole) return false;
  if (!allowedRoles || allowedRoles.length === 0) return true;
  return allowedRoles.includes(userRole.toLowerCase() as UserRole);
}

// ---------------------------------------------------------------------------
// Components to create — check off as you build each page
// ---------------------------------------------------------------------------
${checklistItems.join('\n')}
`;
}

// ── Render output ──────────────────────────────────────────────────────────
function renderOut() {
  document.getElementById('out').innerHTML = hl(generateTS());
}

function hl(code) {
  return esc(code)
    .replace(/\/\/.*$/gm, m => `<span class="cm">${m}</span>`)
    .replace(/\b(import|export|from|const|let|type|interface|function|return|if|true|false|undefined)\b/g, m => `<span class="kw">${m}</span>`)
    .replace(/&quot;([^&]*)&quot;/g, m => `<span class="str">${m}</span>`);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pascal(s) {
  return s.replace(/[^a-zA-Z0-9]+(.)/g, (_,c) => c.toUpperCase()).replace(/^./,c=>c.toUpperCase());
}

function doCopy() {
  navigator.clipboard.writeText(generateTS()).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

function doDownload() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([generateTS()], {type:'text/typescript'}));
  a.download = 'tools.ts'; a.click();
}

render();
</script>
</body>
</html>
